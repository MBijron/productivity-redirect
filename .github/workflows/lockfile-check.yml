name: Lockfile Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-lockfile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify package-lock.json is current
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json