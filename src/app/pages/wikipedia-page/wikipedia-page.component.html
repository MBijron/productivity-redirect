<main class="wiki-shell">
  <iframe
    class="wiki-frame"
    title="Random Wikipedia article"
    [src]="articleUrl()"
    referrerpolicy="strict-origin-when-cross-origin"
  ></iframe>

  <button
    class="wiki-refresh"
    type="button"
    [disabled]="isLoading()"
    [attr.aria-busy]="isLoading()"
    aria-label="Load another random Wikipedia article"
    (click)="refreshArticle()"
  >
    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
      <path fill="currentColor" d="M17.7 6.3A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.8-4.3L13 11h8V3z"></path>
    </svg>
  </button>
</main>
